---
- name: Detect OS family
  raw: cat /etc/os-release | grep "^ID=" | cut -d= -f2 | tr -d '"'
  register: os_id
  changed_when: false

- name: Set OS family fact
  set_fact:
    detected_os: "{{ 'Debian' if 'ubuntu' in os_id.stdout or 'debian' in os_id.stdout else 'RedHat' }}"

- name: Configure Vector on Debian/Ubuntu
  block:
    - name: Create systemd service for Vector
      copy:
        dest: /etc/systemd/system/vector.service
        content: |
          [Unit]
          Description=Vector
          Documentation=https://vector.dev
          After=network.target
          
          [Service]
          Type=simple
          ExecStart=/usr/bin/vector --config /etc/vector/vector.yaml
          Restart=always
          RestartSec=5
          
          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: Start Vector service
  when: detected_os == "Debian"

- name: Install Vector on RedHat/Rocky Linux
  block:
    - name: Download Vector rpm
      get_url:
        url: "https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-1.{{ ansible_architecture }}.rpm"
        dest: "/tmp/vector-{{ vector_version }}.rpm"
        validate_certs: no

    - name: Install Vector from rpm
      yum:
        name: "/tmp/vector-{{ vector_version }}.rpm"
        state: present
        disable_gpg_check: yes
      notify: Start Vector service
  when: detected_os == "RedHat"

- name: Create Vector config directory
  file:
    path: /etc/vector
    state: directory
    mode: '0755'

- name: Configure Vector
  template:
    src: vector.yaml.j2
    dest: /etc/vector/vector.yaml
    mode: '0644'
  notify: Restart Vector service
