---
# tasks file for vector-role
- name: Install dependencies
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
    state: present
    update_cache: true
  become: true

- name: Check if Vector is installed
  ansible.builtin.command: which vector
  register: vector_check
  changed_when: false
  failed_when: false

- name: Download Vector package
  ansible.builtin.get_url:
    url: "{{ vector_package_url }}"
    dest: "/tmp/vector-{{ vector_version }}.deb"
    mode: '0644'
  when: vector_check.rc != 0

- name: Install Vector
  ansible.builtin.apt:
    deb: "/tmp/vector-{{ vector_version }}.deb"
    state: present
  when: vector_check.rc != 0
  notify: restart vector
  become: true

- name: Create Vector configuration directory
  ansible.builtin.file:
    path: "{{ vector_config_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  become: true

- name: Create Vector data directory
  ansible.builtin.file:
    path: "{{ vector_data_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  become: true

- name: Deploy Vector configuration
  ansible.builtin.template:
    src: vector.yml.j2
    dest: "{{ vector_config_file }}"
    mode: '0644'
    owner: root
    group: root
  notify: restart vector
  become: true

- name: Ensure Vector service is enabled and running
  ansible.builtin.systemd:
    name: "{{ vector_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
  become: true
