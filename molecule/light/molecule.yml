---
dependency:
  name: galaxy
  enabled: false
driver:
  name: docker
platforms:
  - name: ubuntu-light
    image: antmelekhin/docker-systemd:ubuntu-22.04
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  inventory:
    host_vars:
      ubuntu-light:
        ansible_user: root
        vector_version: "0.21.0"
        vector_config:
          data_dir: /var/lib/vector
          sources:
            syslog:
              type: syslog
              address: 0.0.0.0:514
              mode: tcp
          sinks:
            console:
              type: console
              inputs: ["syslog"]
              encoding:
                codec: json

verifier:
  name: ansible

scenario:
  name: light
  test_sequence:
    - destroy
    - syntax
    - create
    - converge
    - verify
    - destroy
